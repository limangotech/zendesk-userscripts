# Sign the extension and publish it as a GitHub Release, one store per job.
# Triggered by pushing a version tag (v<version>, matching extension/manifest.json).
#
#   prepare   guards + creates the release as a DRAFT (drafts are invisible to
#             releases/latest, so the update feed keeps serving the previous
#             release until everything is ready)
#   check     the shared CI workflow (ci.yml — the same one that runs on every
#             push/PR): build, committed-generated-files guard, lint
#   firefox   AMO signs the committed extension/ (unlisted) -> uploads the xpi
#             (versioned + stable name) and the cumulative updates.json feed to
#             the draft. No build here: check proved committed == fresh build.
#   chrome    builds only to produce the store zip (check proved committed ==
#             fresh build) -> zip on the draft -> uploads + publishes on the
#             Chrome Web Store (unlisted) — live once Google's review clears,
#             minutes to days after the release
#   publish   flips the draft to published once firefox succeeded — the atomic
#             moment releases/latest/download/updates.json switches over. A failed
#             chrome job never blocks the Firefox release.
#
# Secrets (one-time setup, see DEVELOPMENT.md):
#   firefox — WEB_EXT_API_KEY (JWT issuer) and WEB_EXT_API_SECRET from
#             https://addons.mozilla.org/developers/addon/api/key/ (company AMO account)
#   chrome  — CWS_EXTENSION_ID, CWS_PUBLISHER_ID, CWS_CLIENT_ID,
#             CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN (company CWS publisher account)
#
# Neither store accepts the same version twice (AMO: HTTP 409; CWS: the uploaded
# version must be strictly greater than the live one) — a failed run after the
# signing/upload step needs a version bump + new tag, not a re-run. A failure in
# the publish job alone CAN be re-run safely. See DEVELOPMENT.md.

name: Release extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Lets gh work in jobs that have no checkout (e.g. publish).
  GH_REPO: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      # Tag of the newest published release carrying an updates.json asset;
      # empty means there is no feed yet and a fresh one gets started.
      feed-tag: ${{ steps.feed.outputs.tag }}
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches manifest version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8')).version")
          if [ "$GITHUB_REF_NAME" != "v$VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match extension/manifest.json version $VERSION" >&2
            exit 1
          fi

      - name: Locate the update feed and fail if this version is already listed
        # The feed lives on the newest PUBLISHED release that carries an
        # updates.json asset — releases without one (e.g. created manually, or
        # predating this pipeline) are skipped. AMO rejects duplicate versions
        # anyway (HTTP 409) — catch it before the draft is even created.
        id: feed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          FEED_TAG=$(gh api "repos/$GH_REPO/releases?per_page=100" \
            --jq '[.[] | select(.draft == false and .prerelease == false) | select(any(.assets[]; .name == "updates.json"))][0].tag_name // empty')
          echo "tag=$FEED_TAG" >> "$GITHUB_OUTPUT"
          if [ -z "$FEED_TAG" ]; then
            echo "No published release carries an updates.json yet — the feed will be started fresh."
            exit 0
          fi
          echo "Current feed found on release $FEED_TAG."
          gh release download "$FEED_TAG" --pattern updates.json --dir feed-check
          if node -e "process.exit(Object.values(JSON.parse(require('fs').readFileSync('feed-check/updates.json','utf8')).addons).some(a => a.updates.some(u => u.version === '$VERSION')) ? 0 : 1)"; then
            echo "Version $VERSION is already listed in the update feed — bump the version" >&2
            exit 1
          fi

      - name: Create the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if IS_DRAFT=$(gh release view "$GITHUB_REF_NAME" --json isDraft -q '.isDraft' 2>/dev/null); then
            if [ "$IS_DRAFT" = "true" ]; then
              echo "Draft release for $GITHUB_REF_NAME already exists — reusing it."
            else
              echo "A PUBLISHED release for $GITHUB_REF_NAME already exists — refusing to write into a live release." >&2
              echo "Delete it (gh release delete $GITHUB_REF_NAME) or bump the version and tag again." >&2
              exit 1
            fi
          else
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --generate-notes
          fi

  check:
    uses: ./.github/workflows/ci.yml

  firefox:
    needs: [prepare, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download the update feed located by the prepare job
        # The feed is cumulative: this release ships updates.json = previous feed
        # + the new version. Prepare resolved which release carries the current
        # feed (empty = very first release, start fresh); if one was found, this
        # download must succeed — hard-fail rather than silently restarting the
        # feed and losing the version history.
        env:
          GH_TOKEN: ${{ github.token }}
          FEED_TAG: ${{ needs.prepare.outputs.feed-tag }}
        run: |
          mkdir -p web-ext-artifacts
          if [ -n "$FEED_TAG" ]; then
            gh release download "$FEED_TAG" --pattern updates.json --dir web-ext-artifacts
            echo "Downloaded the feed from $FEED_TAG."
          else
            echo "No existing feed — it will be started fresh."
          fi

      - name: Sign on AMO (unlisted channel)
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        # Unlisted signing is automated and usually takes minutes, but Mozilla
        # documents up to 24h — wait up to 1h here before giving up.
        run: npx web-ext sign --source-dir extension --channel unlisted --approval-timeout 3600000

      - name: Rename signed xpi to the release asset convention
        run: |
          XPI=(web-ext-artifacts/*.xpi)
          { [ ${#XPI[@]} -eq 1 ] && [ -f "${XPI[0]}" ]; } || { echo "Expected exactly one signed xpi, got: ${XPI[*]}" >&2; exit 1; }
          mv "${XPI[0]}" "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi"
          cp "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi" \
             "web-ext-artifacts/zendesk-userscripts.xpi"

      - name: Add this version to the update feed
        run: node scripts/release-update-manifest.mjs "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi"

      - name: Upload the xpi and the feed to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi" \
            "web-ext-artifacts/zendesk-userscripts.xpi" \
            "web-ext-artifacts/updates.json" \
            --clobber

  chrome:
    needs: [prepare, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build only to produce dist/*.zip (not committed) — verification of the
      # generated files happened in the shared check job.
      - run: npm run build

      - name: Upload the store zip to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP=(dist/*.zip)
          ASSET="zendesk-userscripts-$GITHUB_REF_NAME.zip"
          cp "${ZIP[0]}" "$ASSET"
          # This zip is an archival record; the CWS upload below is the job's real work. 
          # On a chrome-only re-run the release may already be published. 
          # So only touch it while the release is still a draft; once it's live, leave the
          # already-attached asset as-is and move on to the CWS step.
          if [ "$(gh release view "$GITHUB_REF_NAME" --json isDraft -q '.isDraft')" = "true" ]; then
            gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
          else
            echo "Release $GITHUB_REF_NAME is already published (immutable) — leaving its assets untouched."
          fi

      - name: Upload and publish on the Chrome Web Store
        # Bare command = upload + submit for publication in one go; the version
        # goes live automatically once Google's review clears (minutes to days).
        # Pinned to v4 — it speaks the CWS API v2 (v1 shuts down 2026-10-15).
        env:
          EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          ZIP=(dist/*.zip)
          npx chrome-webstore-upload-cli@4.0.1 --source "${ZIP[0]}"

  publish:
    # Publish once firefox succeeded — a failed or skipped chrome job must not
    # block the Firefox release (the store upload can be retried on its own).
    # Publishing is what makes the release the new releases/latest.
    needs: [firefox, chrome]
    if: ${{ always() && needs.firefox.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
