# Sign the extension and publish it as a GitHub Release, one store per job.
# Triggered by pushing a version tag (v<version>, matching extension/manifest.json).
#
#   prepare   guards + creates the release as a DRAFT (drafts are invisible to
#             releases/latest, so the update feed keeps serving the previous
#             release until everything is ready)
#   check     the shared CI workflow (ci.yml — the same one that runs on every
#             push/PR): build, committed-generated-files guard, lint
#   firefox   AMO signs the committed extension/ (unlisted) -> uploads the xpi
#             (versioned + stable name) and the cumulative updates.json feed to
#             the draft. No build here: check proved committed == fresh build.
#   chrome    placeholder (skipped) -> builds only to produce the store zip ->
#             zip on the draft, then Chrome Web Store upload, once the CWS
#             account and secrets exist
#   publish   flips the draft to published once firefox succeeded — the atomic
#             moment releases/latest/download/updates.json switches over. A failed
#             chrome job never blocks the Firefox release.
#
# Requires two repo secrets from https://addons.mozilla.org/developers/addon/api/key/
# (company AMO account): WEB_EXT_API_KEY (JWT issuer) and WEB_EXT_API_SECRET.
#
# AMO never accepts the same version twice (HTTP 409) — a failed run after the
# signing step needs a version bump + new tag, not a re-run. A failure in the
# publish job alone CAN be re-run safely. See DEVELOPMENT.md.

name: Release extension

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  # Lets gh work in jobs that have no checkout (e.g. publish).
  GH_REPO: ${{ github.repository }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches manifest version
        run: |
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8')).version")
          if [ "$GITHUB_REF_NAME" != "v$VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match extension/manifest.json version $VERSION" >&2
            exit 1
          fi

      - name: Fail fast if this version is already in the published feed
        # AMO rejects duplicate versions anyway (HTTP 409) — catch it before the
        # draft is even created. Reads the feed of the latest PUBLISHED release;
        # --exclude-drafts keeps a leftover draft from a previous run out of it.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          LATEST=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName -q '.[].tagName')
          if [ -z "$LATEST" ]; then
            echo "No published release yet — nothing to check."
            exit 0
          fi
          gh release download "$LATEST" --pattern updates.json --dir feed-check
          if node -e "process.exit(Object.values(JSON.parse(require('fs').readFileSync('feed-check/updates.json','utf8')).addons).some(a => a.updates.some(u => u.version === '$VERSION')) ? 0 : 1)"; then
            echo "Version $VERSION is already listed in the update feed — bump the version" >&2
            exit 1
          fi

      - name: Create the draft release
        # Reuse an existing release on re-runs instead of stacking duplicate
        # drafts (drafts are not unique per tag).
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release for $GITHUB_REF_NAME already exists — reusing it."
          else
            gh release create "$GITHUB_REF_NAME" \
              --draft \
              --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes "Firefox: signed by Mozilla (AMO unlisted). Install: open the .xpi in Firefox. Installed copies auto-update via the updates.json feed on the latest release."
          fi

  check:
    uses: ./.github/workflows/ci.yml

  firefox:
    needs: [prepare, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Download the update feed from the latest published release
        # The feed is cumulative: this release ships updates.json = previous feed
        # + the new version. The very first release starts a fresh feed. If a
        # published release exists, its feed asset must too — hard-fail rather
        # than silently restarting the feed and losing the version history.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p web-ext-artifacts
          LATEST=$(gh release list --exclude-drafts --exclude-pre-releases --limit 1 --json tagName -q '.[].tagName')
          if [ -n "$LATEST" ]; then
            gh release download "$LATEST" --pattern updates.json --dir web-ext-artifacts
            echo "Downloaded the feed from $LATEST."
          else
            echo "No published release yet — the feed will be started fresh."
          fi

      - name: Sign on AMO (unlisted channel)
        env:
          WEB_EXT_API_KEY: ${{ secrets.WEB_EXT_API_KEY }}
          WEB_EXT_API_SECRET: ${{ secrets.WEB_EXT_API_SECRET }}
        # Unlisted signing is automated and usually takes minutes, but Mozilla
        # documents up to 24h — wait up to 1h here before giving up.
        run: npx web-ext sign --source-dir extension --channel unlisted --approval-timeout 3600000

      - name: Rename signed xpi to the release asset convention
        run: |
          XPI=(web-ext-artifacts/*.xpi)
          { [ ${#XPI[@]} -eq 1 ] && [ -f "${XPI[0]}" ]; } || { echo "Expected exactly one signed xpi, got: ${XPI[*]}" >&2; exit 1; }
          mv "${XPI[0]}" "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi"
          cp "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi" \
             "web-ext-artifacts/zendesk-userscripts.xpi"

      - name: Add this version to the update feed
        run: node scripts/release-update-manifest.mjs "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi"

      - name: Upload the xpi and the feed to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" \
            "web-ext-artifacts/zendesk-userscripts-$GITHUB_REF_NAME.xpi" \
            "web-ext-artifacts/zendesk-userscripts.xpi" \
            "web-ext-artifacts/updates.json" \
            --clobber

  chrome:
    # Placeholder until the Chrome Web Store account and OAuth secrets exist
    # (CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN).
    # To activate: remove the `if: false` and implement the store upload step.
    if: false
    needs: [prepare, check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build only to produce dist/*.zip (not committed) — verification of the
      # generated files happened in the shared check job.
      - run: npm run build

      - name: Upload the store zip to the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ZIP=(dist/*.zip)
          cp "${ZIP[0]}" "zendesk-userscripts-$GITHUB_REF_NAME.zip"
          gh release upload "$GITHUB_REF_NAME" "zendesk-userscripts-$GITHUB_REF_NAME.zip" --clobber

      - name: Upload to the Chrome Web Store
        run: |
          echo "Not implemented yet — needs the CWS account + secrets." >&2
          echo "Intended: npx chrome-webstore-upload-cli@3 upload --source dist/*.zip --auto-publish" >&2
          exit 1

  publish:
    # Publish once firefox succeeded — a failed or skipped chrome job must not
    # block the Firefox release (the store upload can be retried on its own).
    # Publishing is what makes the release the new releases/latest.
    needs: [firefox, chrome]
    if: ${{ always() && needs.firefox.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Publish the draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "$GITHUB_REF_NAME" --draft=false
